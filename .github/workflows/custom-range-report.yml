name: Custom range report

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true

permissions:
  contents: write

concurrency:
  group: site-speed-pages-deploy
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Generate report for the requested range (from existing scan data)
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: npm run report -- range "${{ github.event.inputs.start_date }}" "${{ github.event.inputs.end_date }}"

      - name: Fetch previously published site (if any)
        run: |
          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
            git worktree add previous-site gh-pages
          else
            mkdir -p previous-site
          fi

      - name: Build dashboard
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          PREVIOUS_SITE_REPORTS_DIR: previous-site/reports
        run: npm run dashboard

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true
